<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Academia FitLife</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="login-container">
    <div class="login-card glass-panel">
        <div class="login-header">
            <div class="login-logo">
                <i class="ph-fill ph-barbell"></i>
            </div>
            <h1 class="login-title">Academia FitLife</h1>
            <p class="login-subtitle">Acesse o painel de gestão</p>
        </div>
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <div class="input-wrapper">
                    <i class="ph ph-envelope input-icon"></i>
                    <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <i class="ph ph-lock input-icon"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="togglePwd">
                        <i class="ph ph-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
                <label style="font-weight: 500; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Tipo de Acesso</label>
                <div style="display: flex; gap: 1rem; color: var(--text-main);">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="radio" name="userRole" value="admin" checked style="accent-color: var(--primary);"> Administrador
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="radio" name="userRole" value="aluno" style="accent-color: var(--primary);"> Aluno
                    </label>
                </div>
            </div>
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe"> Lembrar de mim
                </label>
                <a href="#" class="forgot-link">Esqueceu a senha?</a>
            </div>
            <button type="submit" class="btn-primary login-btn" id="loginBtn">
                <span id="btnText">Entrar</span>
                <i class="ph ph-arrow-right"></i>
            </button>
        </form>
        <div class="login-footer">
            <p>Academia FitLife &copy; 2024 &mdash; Sistema de Gestão</p>
        </div>
    </div>
    <div class="login-bg-decoration"></div>
</div>
<script src="js/login.js"></script>
</body>
</html>
