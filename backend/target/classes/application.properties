# Server configuration
server.port=8080

# Configure CORS globally for frontend connections
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# ============================================================
# H2 Database - MODO MEMÓRIA (dados resetam a cada restart)
# ============================================================
spring.datasource.url=jdbc:h2:mem:fitmanagerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Web Console (acesse: http://localhost:8080/h2-console)
# JDBC URL para usar no console: jdbc:h2:file:./data/fitmanagerdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

